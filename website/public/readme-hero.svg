<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" font-family="Geist Sans, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141d2e"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b9c4d6"/>
    </linearGradient>
    <linearGradient id="score" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0081ff"/>
      <stop offset="1" stop-color="#70a3f3"/>
    </linearGradient>
    <linearGradient id="scoreGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8a93a"/>
      <stop offset="1" stop-color="#f2b84b"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0081ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0081ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2b84b" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f2b84b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.028" stroke-width="1"/>
    </pattern>
    <clipPath id="round"><rect x="24" y="24" width="1152" height="452" rx="28"/></clipPath>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="500" fill="#0a0a0a"/>
  <rect x="24" y="24" width="1152" height="452" rx="28" fill="url(#panel)" stroke="#262a31" stroke-width="1.5"/>

  <g clip-path="url(#round)">
    <rect x="24" y="24" width="1152" height="452" fill="url(#grid)"/>
    <circle cx="1080" cy="60" r="300" fill="url(#glowBlue)"/>
    <circle cx="150" cy="500" r="240" fill="url(#glowGold)"/>
    <rect x="24" y="24" width="1152" height="3" fill="#0081ff" opacity="0.85"/>
  </g>

  <!-- ===== LEFT COLUMN ===== -->
  <!-- brand row -->
  <g transform="translate(80 66)">
    <rect width="52" height="52" rx="13" fill="#0081ff"/>
    <text x="26" y="41" text-anchor="middle" fill="#ffffff" font-size="40" font-weight="700">g</text>
    <text x="70" y="26" fill="#f6f7f9" font-size="26" font-weight="600" letter-spacing="0.2">gmod-bench</text>
    <text x="70" y="47" fill="#70a3f3" font-family="Geist Mono, Consolas, monospace" font-size="12.5" letter-spacing="2.5">OPEN&#160;&#160;GMOD&#160;&#160;LEADERBOARD</text>
  </g>

  <!-- headline -->
  <text x="80" y="222" fill="url(#head)" font-size="56" font-weight="600" letter-spacing="-1">Which model actually</text>
  <text x="80" y="288" fill="url(#head)" font-size="56" font-weight="600" letter-spacing="-1">writes good <tspan fill="#70a3f3">GLua</tspan>?</text>

  <!-- subline -->
  <text x="82" y="338" fill="#9ca3af" font-size="21">Real GMod challenges &#183; deterministic scoring &#183; public evidence.</text>

  <!-- url pill -->
  <g transform="translate(80 384)">
    <rect width="214" height="46" rx="23" fill="#0081ff" opacity="0.14"/>
    <rect width="214" height="46" rx="23" fill="none" stroke="#0081ff" stroke-opacity="0.5"/>
    <text x="107" y="30" text-anchor="middle" fill="#93b8f7" font-size="17" font-weight="600" font-family="Geist Mono, Consolas, monospace">gmodbench.com</text>
  </g>

  <!-- ===== RIGHT: leaderboard motif ===== -->
  <g transform="translate(724 82)">
    <rect width="392" height="336" rx="20" fill="#0c1220" stroke="#243247" stroke-width="1.5"/>
    <text x="26" y="42" fill="#e7ecf3" font-size="16" font-weight="600" letter-spacing="0.4" font-family="Geist Mono, Consolas, monospace">LEADERBOARD</text>
    <g transform="translate(300 30)">
      <circle cx="8" cy="8" r="5" fill="#42d392"/>
      <text x="22" y="13" fill="#7f8a99" font-size="13" font-family="Geist Mono, Consolas, monospace">live</text>
    </g>
    <line x1="20" y1="60" x2="372" y2="60" stroke="#1c2636"/>

    <!-- row 1 -->
    <g transform="translate(24 78)">
      <rect width="344" height="52" rx="12" fill="#101a2b" stroke="#f2b84b" stroke-opacity="0.35"/>
      <circle cx="30" cy="26" r="15" fill="url(#scoreGold)"/>
      <text x="30" y="31" text-anchor="middle" fill="#20160a" font-size="15" font-weight="700">1</text>
      <rect x="58" y="14" width="120" height="10" rx="5" fill="#48566b"/>
      <rect x="58" y="30" width="70" height="7" rx="3.5" fill="#2c3648"/>
      <rect x="214" y="19" width="112" height="14" rx="7" fill="#0f1826"/>
      <rect x="214" y="19" width="104" height="14" rx="7" fill="url(#scoreGold)"/>
    </g>
    <!-- row 2 -->
    <g transform="translate(24 138)">
      <rect width="344" height="52" rx="12" fill="#0e1624" stroke="#1f2b3d"/>
      <circle cx="30" cy="26" r="15" fill="#20304a"/>
      <text x="30" y="31" text-anchor="middle" fill="#9fb2cc" font-size="15" font-weight="700">2</text>
      <rect x="58" y="14" width="104" height="10" rx="5" fill="#3c4a5e"/>
      <rect x="58" y="30" width="60" height="7" rx="3.5" fill="#26303f"/>
      <rect x="214" y="19" width="112" height="14" rx="7" fill="#0f1826"/>
      <rect x="214" y="19" width="88" height="14" rx="7" fill="url(#score)"/>
    </g>
    <!-- row 3 -->
    <g transform="translate(24 198)">
      <rect width="344" height="52" rx="12" fill="#0e1624" stroke="#1f2b3d"/>
      <circle cx="30" cy="26" r="15" fill="#1b2740"/>
      <text x="30" y="31" text-anchor="middle" fill="#7f8ca3" font-size="15" font-weight="700">3</text>
      <rect x="58" y="14" width="96" height="10" rx="5" fill="#36435a"/>
      <rect x="58" y="30" width="54" height="7" rx="3.5" fill="#232d3c"/>
      <rect x="214" y="19" width="112" height="14" rx="7" fill="#0f1826"/>
      <rect x="214" y="19" width="72" height="14" rx="7" fill="url(#score)" opacity="0.85"/>
    </g>
    <!-- row 4 (faded) -->
    <g transform="translate(24 258)" opacity="0.55">
      <rect width="344" height="52" rx="12" fill="#0d1420" stroke="#19222f"/>
      <circle cx="30" cy="26" r="15" fill="#161f30"/>
      <text x="30" y="31" text-anchor="middle" fill="#5d6a7d" font-size="15" font-weight="700">4</text>
      <rect x="58" y="14" width="88" height="10" rx="5" fill="#2c384a"/>
      <rect x="58" y="30" width="48" height="7" rx="3.5" fill="#1f2836"/>
      <rect x="214" y="19" width="112" height="14" rx="7" fill="#0f1826"/>
      <rect x="214" y="19" width="58" height="14" rx="7" fill="#3a5578"/>
    </g>
    <!-- footer hint -->
    <text x="196" y="318" text-anchor="middle" fill="#5f6b7c" font-size="12.5" font-family="Geist Mono, Consolas, monospace">expand any row &#8594; see the evidence</text>
  </g>
</svg>
