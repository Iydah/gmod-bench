<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Geist Sans, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdd5e2"/>
    </linearGradient>
    <linearGradient id="sub" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#70a3f3"/>
      <stop offset="0.55" stop-color="#9fb2e6"/>
      <stop offset="1" stop-color="#c9d2e2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0081ff"/>
      <stop offset="0.45" stop-color="#70a3f3"/>
      <stop offset="0.75" stop-color="#42d392"/>
      <stop offset="1" stop-color="#f2b84b"/>
    </linearGradient>
    <radialGradient id="markGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0081ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0081ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- flat black canvas -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <circle cx="1000" cy="315" r="330" fill="url(#markGlow)"/>

  <!-- top row -->
  <g transform="translate(72 60)">
    <rect width="34" height="34" rx="9" fill="#0081ff"/>
    <text x="17" y="26" text-anchor="middle" fill="#ffffff" font-size="25" font-weight="700">g</text>
    <text x="50" y="24" fill="#e7ecf3" font-family="Geist Mono, Consolas, monospace" font-size="20" font-weight="600" letter-spacing="5">GMOD-BENCH</text>
  </g>
  <text x="1128" y="84" text-anchor="end" fill="#6b7280" font-family="Geist Mono, Consolas, monospace" font-size="20" letter-spacing="1">gmodbench.com</text>

  <!-- oversized headline -->
  <text x="70" y="300" fill="url(#ink)" font-size="82" font-weight="700" letter-spacing="-2.5">Which model writes</text>
  <text x="70" y="392" fill="url(#ink)" font-size="82" font-weight="700" letter-spacing="-2.5">good GLua?</text>

  <!-- gradient-tinted subline -->
  <text x="72" y="470" fill="url(#sub)" font-size="29" letter-spacing="-0.2">Real GMod challenges. Deterministic scoring.</text>
  <text x="72" y="512" fill="url(#sub)" font-size="29" letter-spacing="-0.2">Public evidence. An open leaderboard for GLua.</text>

  <!-- big low-key brand mark on the right -->
  <g transform="translate(872 188)">
    <rect width="256" height="256" rx="58" fill="#0d1626" stroke="#20304a" stroke-width="2"/>
    <text x="128" y="196" text-anchor="middle" fill="#eef2f8" font-size="210" font-weight="700">g</text>
  </g>

  <!-- signature bottom hairline -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
